<svg xmlns="http://www.w3.org/2000/svg" width="800" height="580" viewBox="0 0 800 580">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
    .t { font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace; font-size: 13px; }
    .b { font-weight: 700; }
    .green { fill: #50fa7b; }
    .yellow { fill: #f1fa8c; }
    .red { fill: #ff5555; }
    .cyan { fill: #8be9fd; }
    .white { fill: #f8f8f2; }
    .gray { fill: #6272a4; }
    .orange { fill: #ffb86c; }
    .purple { fill: #bd93f9; }
    .pink { fill: #ff79c6; }

    /* Animation: lines appear sequentially */
    .line { opacity: 0; }
    .line.l1  { animation: appear 0.1s 0.3s forwards; }
    .line.l2  { animation: appear 0.1s 0.8s forwards; }
    .line.l3  { animation: appear 0.1s 1.0s forwards; }
    .line.l4  { animation: appear 0.1s 1.2s forwards; }
    .line.l5  { animation: appear 0.1s 1.4s forwards; }
    .line.l6  { animation: appear 0.1s 1.6s forwards; }
    .line.l7  { animation: appear 0.1s 1.8s forwards; }
    .line.l8  { animation: appear 0.1s 2.2s forwards; }
    .line.l9  { animation: appear 0.1s 2.5s forwards; }
    .line.l10 { animation: appear 0.1s 2.8s forwards; }
    .line.l11 { animation: appear 0.1s 3.1s forwards; }
    .line.l12 { animation: appear 0.1s 3.4s forwards; }
    .line.l13 { animation: appear 0.1s 3.7s forwards; }
    .line.l14 { animation: appear 0.1s 4.0s forwards; }
    .line.l15 { animation: appear 0.1s 4.5s forwards; }
    .line.l16 { animation: appear 0.1s 4.7s forwards; }
    .line.l17 { animation: appear 0.1s 4.9s forwards; }
    .line.l18 { animation: appear 0.1s 5.1s forwards; }
    .line.l19 { animation: appear 0.1s 5.5s forwards; }
    .line.l20 { animation: appear 0.1s 5.8s forwards; }
    .line.l21 { animation: appear 0.1s 6.2s forwards; }

    /* Cursor blink */
    .cursor { animation: blink 1s step-end infinite; }

    @keyframes appear {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0; }
    }
  </style>

  <!-- Terminal chrome -->
  <rect width="800" height="580" rx="10" fill="#282a36"/>
  <rect width="800" height="36" rx="10" fill="#21222c"/>
  <rect y="26" width="800" height="10" fill="#21222c"/>
  <circle cx="20" cy="18" r="6" fill="#ff5555"/>
  <circle cx="40" cy="18" r="6" fill="#f1fa8c"/>
  <circle cx="60" cy="18" r="6" fill="#50fa7b"/>
  <text x="400" y="22" text-anchor="middle" class="t gray" font-size="12">claude &mdash; /doctor scan</text>

  <!-- Terminal content -->
  <g transform="translate(20, 56)">
    <!-- Command -->
    <g class="line l1">
      <text y="0" class="t purple b">$ /doctor scan</text>
    </g>

    <!-- Phase 1: Project Profile -->
    <g class="line l2">
      <text y="28" class="t gray">Phase 1: Studying project...</text>
    </g>
    <g class="line l3">
      <text y="52" class="t white b">Project Profile</text>
    </g>
    <g class="line l4">
      <text y="72" class="t cyan">  Stack:        </text>
      <text y="72" x="146" class="t white">Python 3.12 / asyncio / PostgreSQL</text>
    </g>
    <g class="line l5">
      <text y="90" class="t cyan">  Test Runner:  </text>
      <text y="90" x="146" class="t white">pytest, 1089 tests</text>
    </g>
    <g class="line l6">
      <text y="108" class="t cyan">  Linter:       </text>
      <text y="108" x="146" class="t white">ruff check + ruff format</text>
    </g>
    <g class="line l7">
      <text y="126" class="t cyan">  Deploy:       </text>
      <text y="126" x="146" class="t white">Railway (Docker)</text>
    </g>

    <!-- Phase 2: Diagnosis -->
    <g class="line l8">
      <text y="160" class="t gray">Phase 2: Running 42 checks...</text>
    </g>

    <!-- Layer scores -->
    <g class="line l9">
      <text y="188" class="t pink">  Security:      </text>
      <text y="188" x="170" class="t green b">8/11</text>
      <text y="188" x="220" class="t yellow"> &#8212; permissions, CI scan</text>
    </g>
    <g class="line l10">
      <text y="210" class="t pink">  Foundation:    </text>
      <text y="210" x="170" class="t green b">5/5</text>
      <text y="210" x="220" class="t green"> &#10003;</text>
    </g>
    <g class="line l11">
      <text y="232" class="t pink">  Quality Gates: </text>
      <text y="232" x="170" class="t green b">9/11</text>
      <text y="232" x="220" class="t yellow"> &#8212; pre-push, coverage</text>
    </g>
    <g class="line l12">
      <text y="254" class="t pink">  Intelligence:  </text>
      <text y="254" x="170" class="t orange b">1/2</text>
      <text y="254" x="220" class="t red">  &#8212; domain rules</text>
    </g>
    <g class="line l13">
      <text y="276" class="t pink">  Context:       </text>
      <text y="276" x="170" class="t green b">4/5</text>
      <text y="276" x="220" class="t yellow"> &#8212; episodic memory</text>
    </g>
    <g class="line l14">
      <text y="298" class="t pink">  DX:            </text>
      <text y="298" x="170" class="t green b">6/7</text>
      <text y="298" x="220" class="t red">  &#8212; smoke tests</text>
    </g>

    <!-- Checklist sample -->
    <g class="line l15">
      <text y="332" class="t gray">&#9473;&#9473;&#9473; Layer 0: Security &#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;&#9473;</text>
    </g>
    <g class="line l16">
      <text y="354" class="t green">  &#10003; Secrets not in git</text>
    </g>
    <g class="line l17">
      <text y="374" class="t green">  &#10003; No hardcoded secrets in source</text>
    </g>
    <g class="line l18">
      <text y="394" class="t green">  &#10003; .env.example synced</text>
    </g>
    <g class="line l19">
      <text y="414" class="t yellow">  &#9888; .gitignore incomplete &#8212; missing *.pem, *.key</text>
    </g>
    <g class="line l20">
      <text y="434" class="t yellow">  &#9888; .env permissions 644 &#8212; world-readable</text>
    </g>

    <!-- Total -->
    <g class="line l21">
      <text y="472" class="t white b" font-size="15">Total: </text>
      <text y="472" x="66" class="t green b" font-size="15">33/42 (79%)</text>
      <text y="472" x="230" class="t green b"> &#8212; GOOD</text>
    </g>
  </g>

  <!-- Cursor -->
  <rect x="20" y="540" width="8" height="16" fill="#f8f8f2" class="cursor"/>
</svg>