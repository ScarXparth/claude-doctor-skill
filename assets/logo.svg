<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#bd93f9"/>
      <stop offset="100%" style="stop-color:#8855dd"/>
    </linearGradient>
    <linearGradient id="innerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2d2f3d"/>
      <stop offset="100%" style="stop-color:#282a36"/>
    </linearGradient>
  </defs>

  <!-- Shield shape -->
  <path d="M 64 8 L 112 28 L 112 62 C 112 90, 92 110, 64 120 C 36 110, 16 90, 16 62 L 16 28 Z"
        fill="url(#shieldGrad)" stroke="none"/>

  <!-- Inner shield -->
  <path d="M 64 14 L 106 32 L 106 62 C 106 87, 88 105, 64 114 C 40 105, 22 87, 22 62 L 22 32 Z"
        fill="url(#innerGrad)" stroke="none"/>

  <!-- Code brackets { } as stethoscope tubing -->
  <path d="M 50 38 C 40 38, 36 46, 36 54 C 36 58, 39 61, 43 61 C 39 61, 36 64, 36 68 C 36 76, 40 84, 50 84"
        fill="none" stroke="#bd93f9" stroke-width="3.5" stroke-linecap="round" opacity="0.9"/>
  <path d="M 78 38 C 88 38, 92 46, 92 54 C 92 58, 89 61, 85 61 C 89 61, 92 64, 92 68 C 92 76, 88 84, 78 84"
        fill="none" stroke="#bd93f9" stroke-width="3.5" stroke-linecap="round" opacity="0.9"/>

  <!-- Stethoscope head (center circle) -->
  <circle cx="64" cy="61" r="12" fill="none" stroke="#50fa7b" stroke-width="2.5"/>
  <circle cx="64" cy="61" r="5" fill="#50fa7b" opacity="0.8"/>

  <!-- Heartbeat / pulse line -->
  <polyline points="47,61 55,61 58,51 61,71 64,54 67,68 70,61 81,61"
            fill="none" stroke="#ff79c6" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Small checkmark at top of shield -->
  <polyline points="56,28 62,34 74,22"
            fill="none" stroke="#50fa7b" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
</svg>