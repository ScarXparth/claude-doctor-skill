<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#bd93f9;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#bd93f9;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="60" cy="60" r="58" fill="#282a36" stroke="#44475a" stroke-width="2"/>
  <!-- Subtle glow -->
  <circle cx="60" cy="60" r="45" fill="url(#glow)"/>
  <!-- Stethoscope tubing - forms { bracket shape -->
  <path d="M 48 28 C 35 28, 28 38, 28 50 C 28 56, 32 60, 38 60 C 32 60, 28 64, 28 70 C 28 82, 35 92, 48 92"
        fill="none" stroke="#bd93f9" stroke-width="4" stroke-linecap="round"/>
  <!-- Right bracket } -->
  <path d="M 72 28 C 85 28, 92 38, 92 50 C 92 56, 88 60, 82 60 C 88 60, 92 64, 92 70 C 92 82, 85 92, 72 92"
        fill="none" stroke="#bd93f9" stroke-width="4" stroke-linecap="round"/>
  <!-- Stethoscope chest piece (center) -->
  <circle cx="60" cy="60" r="10" fill="none" stroke="#50fa7b" stroke-width="3"/>
  <circle cx="60" cy="60" r="4" fill="#50fa7b"/>
  <!-- Heartbeat line through center -->
  <polyline points="44,60 52,60 55,52 58,68 61,55 64,65 67,60 76,60"
            fill="none" stroke="#ff79c6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>